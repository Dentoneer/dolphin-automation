name: Run Dolphin Pool Robot

on:
  schedule:
    - cron: '0 7 * * *'   # 2:00 AM CT (CDT = UTC-5)
    - cron: '0 17 * * *'  # Noon CT    — runs only if temperature > 80°F
    - cron: '0 23 * * *'  # 6:00 PM CT — runs only if temperature > 90°F
  workflow_dispatch:        # trigger manually from the Actions tab anytime

jobs:
  start-robot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check weather conditions
        id: weather
        env:
          WEATHER_LAT: ${{ vars.WEATHER_LAT }}
          WEATHER_LON: ${{ vars.WEATHER_LON }}
        run: python check_weather.py

      - name: Start pool robot
        if: steps.weather.outputs.should_run == 'true'
        env:
          DOLPHIN_EMAIL: ${{ secrets.DOLPHIN_EMAIL }}
          DOLPHIN_REFRESH_TOKEN: ${{ secrets.DOLPHIN_REFRESH_TOKEN }}
        run: python dolphin_start.py
